  <body>
    <div id="root"></div>
    <script>
      const theme = localStorage.getItem("themeMode") || "light";
      if (theme === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
